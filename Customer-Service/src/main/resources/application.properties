#Configure the below given properties in CustomerMS.yml of consul server

spring.application.name=Customer-service
server.port=3336

#spring.datasource.url=jdbc:mysql://localhost:3306/EKART_CUSTOMER?useSSL=false
spring.datasource.url=jdbc:mysql://localhost:3306/EKART_CUSTOMER?allowPublicKeyRetrieval=true&useSSL=false

#Configure the below common properties in application.yml of consul server
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.show-sql=true
#server.error.whitelabel.enabled=false
logging.level.org.hibernate.type=info
spring.jpa.properties.hibernate.show_sql: true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.context-path=/Ekart

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


CustomerAPI.productAPIBaseURL = "http://localhost:3334/product-api/product/"

#spring.cloud.consul.discovery.health-check-url =  http://localhost:${server.port}${server.servlet.context-path}/actuator

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=customer-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.topics.order-created=order.created
spring.kafka.topics.order-cancelled=order.cancelled

# Kafka Topics (without spring prefix for @Value annotations)
kafka.topics.order-created=order.created
kafka.topics.order-cancelled=order.cancelled
kafka.topics.payment-completed=payment.completed
kafka.topics.inventory-failed=inventory.failed

